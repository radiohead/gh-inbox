version: 2

project_name: gh-inbox

builds:
  - main: .
    binary: gh-inbox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?(?:feat|Add|Implement|Filter|Optimize|Rewrite|Rework|Redefine).*$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?(?:fix|Fix).*$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "(?i)^Sync beads"
      - "(?i)^Initialize beads"
      - "(?i)^Restructure beads"
      - "(?i)^Add CLAUDE"
      - "(?i)^Add beads"
      - "(?i)^Migrate to beads"

release:
  github:
    owner: radiohead
    name: gh-inbox
  draft: false
  prerelease: auto
